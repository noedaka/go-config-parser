edition = "2023";

package parse.go_config_parser;

option go_package = "github.com/noedaka/go-config-parser/internal/proto";

message ConfigStringRequest {
    string data = 1;
}

message RecsResponse {
    string recs = 1;
}

service ConfigRecsService {
    rpc GetConfigRecsByString (ConfigStringRequest) returns (RecsResponse);
}